<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notum Gelsin — Mobil Önizleme</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0; padding: 0; background: #07080f; height: 100vh; overflow: hidden;
    display: flex; flex-direction: column; font-family: 'Inter', sans-serif;
  }
  
  /* Arkaplan ışıltıları */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 50% 50% at 80% 20%, rgba(108,99,255,.15) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(6,214,160,.08) 0%, transparent 55%);
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: rgba(14,16,24,0.9); border-bottom: 1px solid rgba(255,255,255,0.05);
    z-index: 10; flex-shrink: 0; color: #fff;
  }
  .header-title { font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .header-title span { background: linear-gradient(130deg,#55d0ff,#b29bff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .controls { display: flex; align-items: center; gap: 16px; }
  .controls label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 8px; }
  
  input[type="range"] {
    -webkit-appearance: none; width: 120px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #6c63ff; cursor: pointer;
  }
  
  .btn {
    padding: 8px 16px; border-radius: 10px; border: none; background: linear-gradient(135deg,#6c63ff,#4f46e5);
    color: #fff; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
  }

  .stage { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 20px; }

  .phone {
    width: 390px; height: 780px; background: #0e1018; border-radius: 54px; padding: 14px;
    box-shadow: 0 0 0 2px #222536, inset 0 0 0 2px #1e2130, 0 40px 100px rgba(0,0,0,0.8);
    position: relative; transition: transform 0.2s ease-out; transform-origin: center;
  }
  
  /* Yan butonlar */
  .phone::before { content: ''; position: absolute; left: -2px; top: 100px; width: 2px; height: 30px; background: #222536; }
  .phone::after { content: ''; position: absolute; right: -2px; top: 120px; width: 2px; height: 60px; background: #222536; }

  .screen {
    width: 100%; height: 100%; border-radius: 42px; background: #000; overflow: hidden; position: relative;
  }
  
  iframe { width: 100%; height: 100%; border: none; display: block; }
  
  .island {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 34px;
    background: #000; border-radius: 20px; pointer-events: none; z-index: 10;
  }
  .home-ind {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 130px; height: 4px;
    background: rgba(255,255,255,0.3); border-radius: 2px; pointer-events: none; z-index: 10;
  }

</style>
</head>
<body>

<div class="header">
  <div class="header-title">📱 <span>Mobil Görünüm</span></div>
  <div class="controls">
    <label>Zoom <input type="range" id="zoom" min="40" max="100" value="85" oninput="setZoom(this.value)"><span id="zval">%85</span></label>
    <button class="btn" onclick="window.open('index.html','_blank')">Tam Ekran Aç</button>
  </div>
</div>

<div class="stage">
  <div class="phone" id="phone">
    <div class="screen">
      <div class="island"></div>
      <iframe src="index.html"></iframe>
      <div class="home-ind"></div>
    </div>
  </div>
</div>

<script>
  function setZoom(v) {
    document.getElementById('phone').style.transform = `scale(${v/100})`;
    document.getElementById('zval').innerText = `%${v}`;
  }
  // Otomatik sığdır
  window.addEventListener('load', () => {
    const stageH = document.querySelector('.stage').clientHeight;
    if(stageH < 850) setZoom(Math.floor((stageH / 850) * 100));
  });
</script>

</body>
</html>
